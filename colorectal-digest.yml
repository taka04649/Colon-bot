name: Colorectal Weekly Digest

on:
  schedule:
    # 毎週月曜 22:00 UTC (JST 火曜 07:00)
    - cron: '0 22 * * 1'
  workflow_dispatch:
    inputs:
      days_back:
        description: '遡る日数'
        required: false
        default: '7'
      max_papers:
        description: '解析論文の上限'
        required: false
        default: '60'

permissions:
  contents: write

concurrency:
  group: colorectal-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_COLORECTAL }}
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          MODEL: claude-sonnet-4-6
          DAYS_BACK: ${{ github.event.inputs.days_back || '7' }}
          MAX_PAPERS: ${{ github.event.inputs.max_papers || '60' }}
        run: python -m bots.colorectal_digest.main

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/colorectal_digest/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: colorectal digest $(date -u +%Y-%m-%d)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
