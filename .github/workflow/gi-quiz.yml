name: GI Quiz of the Day

on:
  schedule:
    # 問題投稿: 毎日 22:00 UTC (JST 翌 07:00)
    - cron: '0 22 * * *'
    # 解説投稿: 毎日 11:00 UTC (JST 20:00)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        type: choice
        default: question
        options:
          - question
          - answer

permissions:
  contents: write

concurrency:
  group: gi-quiz
  cancel-in-progress: false

jobs:
  quiz:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "mode=question" >> $GITHUB_OUTPUT
          else
            echo "mode=answer" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_QUIZ }}
          MODEL: claude-sonnet-4-6
          COLORECTAL_WEIGHT: '0.6'
          QUIZ_MODE: ${{ steps.mode.outputs.mode }}
        run: python -m bots.gi_quiz.main

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/gi_quiz/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: gi quiz ${{ steps.mode.outputs.mode }} $(date -u +%Y-%m-%d)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
