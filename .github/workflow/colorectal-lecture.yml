name: Colorectal Daily Lecture

on:
  schedule:
    # 毎日 21:00 UTC (JST 翌 06:00)
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: colorectal-lecture
  cancel-in-progress: false

jobs:
  lecture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_COLORECTAL }}
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          MODEL: claude-sonnet-4-6
          TARGET_CHARS: '1000'
        run: python -m bots.colorectal_lecture.main

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/colorectal_lecture/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: colorectal lecture $(date -u +%Y-%m-%d)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
